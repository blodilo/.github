name: License Check (reusable)

# Reusable license-check workflow shared across all blodilo projects.
# See ~/.claude/CLAUDE.md → "SBOM-Generierung & License-Check-Gate" for the
# umbrella spec. Consumers call this via `uses:`; see README.md.

on:
  workflow_call:
    inputs:
      language:
        description: 'node | python | go | kotlin | rust | mixed'
        type: string
        required: true
      frontend-path:
        description: 'Path to the frontend package (used for node SBOM)'
        type: string
        default: ./frontend
      backend-path:
        description: 'Path to the backend package (used for python SBOM)'
        type: string
        default: ./backend
      extra-checkout-repo:
        description: |
          Optional sibling repo to check out next to the consumer repo —
          needed when package.json contains file:../ deps that point to
          another local package. Format: owner/repo.
        type: string
        required: false
        default: ''
    secrets:
      extra-checkout-token:
        description: |
          PAT or installation token with read access to extra-checkout-repo.
          Required only if that repo is private.
        required: false

jobs:
  generate-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      # ── Optional sibling-repo checkout for file:../ deps ──────────────────
      - name: Checkout extra repo (sibling for file:../ deps)
        if: inputs.extra-checkout-repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.extra-checkout-repo }}
          path: __extra
          token: ${{ secrets.extra-checkout-token || github.token }}

      # actions/checkout@v4 refuses paths outside $GITHUB_WORKSPACE; move
      # post-checkout so the extra repo lives as a real sibling next to the
      # consumer (i.e. resolvable by `file:../<extra-repo>` in package.json).
      - name: Promote extra repo to sibling path
        if: inputs.extra-checkout-repo != ''
        run: |
          EXTRA_NAME="$(basename '${{ inputs.extra-checkout-repo }}')"
          mv __extra "../${EXTRA_NAME}"
          ls -la ..

      # ── Frontend SBOM (Node) ──────────────────────────────────────────────
      - name: Setup Node
        if: contains(fromJson('["node", "mixed"]'), inputs.language)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Detect package manager by lockfile. Supported: npm, pnpm, yarn.
      # Default = npm (legacy behaviour, keeps existing consumers green).
      - name: Detect Node package manager
        id: nodepm
        if: contains(fromJson('["node", "mixed"]'), inputs.language)
        working-directory: ${{ inputs.frontend-path }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.nodepm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend deps
        if: contains(fromJson('["node", "mixed"]'), inputs.language)
        working-directory: ${{ inputs.frontend-path }}
        run: |
          case "${{ steps.nodepm.outputs.pm }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *)    npm ci --no-audit --no-fund ;;
          esac

      # cyclonedx-npm walks node_modules and works for npm/pnpm/yarn trees.
      # --ignore-npm-errors keeps it tolerant of pnpm's symlink layout.
      - name: Generate frontend SBOM
        if: contains(fromJson('["node", "mixed"]'), inputs.language)
        working-directory: ${{ inputs.frontend-path }}
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --output-file ../sbom-frontend.json \
            --output-format json \
            --omit dev \
            --ignore-npm-errors

      # ── Backend SBOM (Python) ─────────────────────────────────────────────
      - name: Setup Python
        if: contains(fromJson('["python", "mixed"]'), inputs.language)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        if: contains(fromJson('["python", "mixed"]'), inputs.language)
        run: pip install --quiet uv cyclonedx-bom

      - name: Generate backend SBOM
        if: contains(fromJson('["python", "mixed"]'), inputs.language)
        working-directory: ${{ inputs.backend-path }}
        run: |
          if [ -f uv.lock ]; then
            uv sync --all-extras
            uv run cyclonedx-py environment --of json -o ../sbom-backend.json
          elif [ -f poetry.lock ]; then
            cyclonedx-py poetry --of json -o ../sbom-backend.json
          elif [ -f requirements.txt ]; then
            cyclonedx-py requirements --of json -o ../sbom-backend.json requirements.txt
          else
            cyclonedx-py environment --of json -o ../sbom-backend.json
          fi

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Checkout license-check tooling
        uses: actions/checkout@v4
        with:
          repository: blodilo/.github
          path: __license_check
          ref: main

      - name: Run license validator
        run: |
          ARGS=()
          [ -f sbom-frontend.json ] && ARGS+=(--sbom sbom-frontend.json)
          [ -f sbom-backend.json ]  && ARGS+=(--sbom sbom-backend.json)
          [ -f license-exceptions.json ] && ARGS+=(--exceptions license-exceptions.json)
          python3 __license_check/license-check/check_licenses.py \
            --whitelist __license_check/license-check/license-whitelist.json \
            "${ARGS[@]}"

      # ── Upload SBOMs as workflow artifact (90 day retention) ──────────────
      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_id }}
          path: |
            sbom-frontend.json
            sbom-backend.json
          if-no-files-found: ignore
          retention-days: 90
